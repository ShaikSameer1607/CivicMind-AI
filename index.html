<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CivicMind AI — The AI Operating System for Smart Cities</title>
  <meta name="description" content="CivicMind AI is an AI-powered civic intelligence platform that transforms city governance with predictive analytics, community verification, and intelligent issue resolution." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script>
    // Suppress leaflet-heat canvas crash (IndexSizeError) when map container has zero dimensions
    // This occurs on direct page reload before the DOM has been laid out
    window.addEventListener('error', function(e) {
      if (e.filename && e.filename.indexOf('leaflet-heat') !== -1) { e.preventDefault(); }
    });
  </script>

</head>

</body>
</html>
