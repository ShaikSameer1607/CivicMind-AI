steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/civicmind-ai:$COMMIT_SHA"
      - "--build-arg"
      - "VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY"
      - "--build-arg"
      - "VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN"
      - "--build-arg"
      - "VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID"
      - "--build-arg"
      - "VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET"
      - "--build-arg"
      - "VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID"
      - "--build-arg"
      - "VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID"
      - "--build-arg"
      - "VITE_SUPABASE_URL=$_VITE_SUPABASE_URL"
      - "--build-arg"
      - "VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY"
      - "--build-arg"
      - "VITE_GEMINI_API_KEY=$_VITE_GEMINI_API_KEY"
      - "--build-arg"
      - "VITE_GROK_API_KEY=$_VITE_GROK_API_KEY"
      - "--build-arg"
      - "VITE_GROQ_API_KEY=$_VITE_GROQ_API_KEY"
      - "--build-arg"
      - "VITE_DEFAULT_AI_PROVIDER=$_VITE_DEFAULT_AI_PROVIDER"
      - "."

  # Push the container image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/civicmind-ai:$COMMIT_SHA"

  # Deploy container image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "civicmind-ai"
      - "--image"
      - "gcr.io/$PROJECT_ID/civicmind-ai:$COMMIT_SHA"
      - "--region"
      - "asia-south1"
      - "--port"
      - "8080"
      - "--allow-unauthenticated"
      - "--set-env-vars"
      - "VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN=$_VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET=$_VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID=$_VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID,VITE_SUPABASE_URL=$_VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY=$_VITE_SUPABASE_ANON_KEY,VITE_GEMINI_API_KEY=$_VITE_GEMINI_API_KEY,VITE_GROK_API_KEY=$_VITE_GROK_API_KEY,VITE_GROQ_API_KEY=$_VITE_GROQ_API_KEY,VITE_DEFAULT_AI_PROVIDER=$_VITE_DEFAULT_AI_PROVIDER"

images:
  - "gcr.io/$PROJECT_ID/civicmind-ai:$COMMIT_SHA"

